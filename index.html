<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Red Flag: A Fraud Investigation Game">
  <title>Red Flag | Fraud Investigation Game</title>
  <style>
:root {
  --bg: #101827;
  --panel: #182235;
  --panel-2: #202d44;
  --paper: #f6f0e7;
  --paper-2: #ebe2d5;
  --ink: #f8fafc;
  --muted: #aeb8c8;
  --muted-dark: #667085;
  --red: #ef4444;
  --red-dark: #7f1d1d;
  --amber: #f59e0b;
  --green: #22c55e;
  --blue: #38bdf8;
  --line: rgba(255, 255, 255, 0.12);
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(239, 68, 68, 0.16), transparent 30rem),
    radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.14), transparent 28rem),
    var(--bg);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

button,
input,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  position: relative;
  width: min(100%, 520px);
  min-height: 100vh;
  margin: 0 auto;
  background: linear-gradient(180deg, rgba(16, 24, 39, 0.96), rgba(11, 18, 32, 0.98));
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 5;
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) auto 44px;
  gap: 12px;
  align-items: center;
  padding: 14px 16px 10px;
  background: rgba(16, 24, 39, 0.88);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--line);
}

.topbar h1 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 0;
}

.eyebrow {
  margin: 0 0 2px;
  color: var(--amber);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.icon-button {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.05);
  color: var(--ink);
}

.button-icon {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2.3;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.screen {
  min-height: calc(100vh - 148px);
  padding: 18px 16px 94px;
}

.bottom-nav {
  position: fixed;
  left: 50%;
  bottom: 0;
  z-index: 6;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  width: min(100%, 520px);
  transform: translateX(-50%);
  padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
  background: rgba(11, 18, 32, 0.94);
  backdrop-filter: blur(18px);
  border-top: 1px solid var(--line);
}

.nav-button {
  display: grid;
  gap: 4px;
  justify-items: center;
  min-height: 54px;
  border: 0;
  border-radius: var(--radius);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}

.nav-button.active {
  background: rgba(239, 68, 68, 0.14);
  color: var(--ink);
}

.nav-icon {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border: 1px solid currentColor;
  border-radius: 6px;
  font-size: 12px;
}

.hero {
  position: relative;
  overflow: hidden;
  min-height: 0;
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background:
    linear-gradient(135deg, rgba(239, 68, 68, 0.18), rgba(245, 158, 11, 0.08)),
    var(--panel);
  box-shadow: var(--shadow);
}

.investigator-graphic {
  position: absolute;
  right: -12px;
  top: 20px;
  z-index: 0;
  width: 190px;
  max-width: 42%;
  opacity: 0.14;
  pointer-events: none;
}

.hero > *:not(.investigator-graphic) {
  position: relative;
  z-index: 1;
}

.hero h2,
.hero p {
  max-width: 420px;
}

.hero h2,
.page-title {
  margin: 0 0 12px;
  font-size: 38px;
  line-height: 1.02;
  letter-spacing: 0;
}

.hero p,
.lead {
  color: var(--muted);
  font-size: 16px;
  line-height: 1.55;
}

@media (min-width: 460px) {
  .hero {
    padding-right: 24px;
  }
}

@media (max-width: 380px) {
  .investigator-graphic {
    width: 150px;
    opacity: 0.1;
  }
}

.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}

.hero .button-row {
  display: grid;
  grid-template-columns: 1fr 1.12fr;
  max-width: 460px;
}

.hero .button-row button {
  width: 100%;
}

.mode-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 18px;
  padding: 6px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(11, 18, 32, 0.48);
}

.mode-toggle button {
  min-height: 42px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-weight: 900;
}

.mode-toggle button.selected {
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.12);
  color: var(--ink);
  box-shadow: inset 0 -2px 0 var(--amber);
}

.primary-button,
.secondary-button,
.choice-button,
.text-button {
  min-height: 48px;
  border-radius: var(--radius);
  font-weight: 800;
}

.primary-button {
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: var(--red);
  color: white;
  padding: 0 16px;
}

.secondary-button {
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.05);
  color: var(--ink);
  padding: 0 16px;
}

.text-button {
  border: 0;
  background: transparent;
  color: var(--blue);
  padding: 0;
}

.reset-menu {
  position: relative;
  display: grid;
  justify-items: end;
}

.reset-menu-panel {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  z-index: 10;
  display: none;
  width: min(260px, 78vw);
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(16, 24, 39, 0.98);
  box-shadow: var(--shadow);
}

.reset-menu.open .reset-menu-panel {
  display: grid;
  gap: 6px;
}

.reset-option {
  min-height: 44px;
  border: 0;
  border-radius: 6px;
  background: transparent;
  color: var(--ink);
  text-align: left;
  padding: 8px 10px;
}

.reset-option:hover {
  background: rgba(255, 255, 255, 0.08);
}

.stats-grid,
.difficulty-grid,
.badge-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 16px 0;
}

.stat-card,
.info-card,
.case-card,
.evidence-card,
.result-card,
.badge-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.055);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
}

.stat-card {
  padding: 14px;
}

.stat-value {
  display: block;
  margin-bottom: 4px;
  font-size: 24px;
  font-weight: 900;
}

.stat-label,
.small-label {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.section-title {
  margin: 26px 0 12px;
  font-size: 18px;
}

.info-card {
  padding: 16px;
  margin-bottom: 12px;
}

.info-card h3,
.case-card h3,
.result-card h3 {
  margin: 0 0 8px;
}

.info-card p,
.case-card p,
.result-card p,
.evidence-card p {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}

.guide-card {
  background: rgba(255, 255, 255, 0.04);
}

.case-card {
  display: grid;
  gap: 10px;
  width: 100%;
  padding: 16px;
  margin-bottom: 12px;
  border-color: var(--line);
  color: var(--ink);
  text-align: left;
}

.case-card.locked {
  opacity: 0.52;
}

.case-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
  color: var(--muted);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.badge.red {
  background: rgba(239, 68, 68, 0.16);
  color: #fecaca;
}

.badge.amber {
  background: rgba(245, 158, 11, 0.16);
  color: #fde68a;
}

.badge.green {
  background: rgba(34, 197, 94, 0.16);
  color: #bbf7d0;
}

.badge.blue {
  background: rgba(56, 189, 248, 0.16);
  color: #bae6fd;
}

.case-file {
  overflow: hidden;
  border-radius: var(--radius);
  background: var(--paper);
  color: #172033;
  box-shadow: var(--shadow);
}

.case-file-header {
  padding: 18px;
  background: linear-gradient(135deg, #fff7ed, #f6f0e7);
  border-bottom: 1px solid rgba(23, 32, 51, 0.12);
}

.case-file-header h2 {
  margin: 6px 0 8px;
  font-size: 26px;
  line-height: 1.08;
}

.case-file-header p {
  margin: 0;
  color: #4b5563;
  line-height: 1.45;
}

.case-objective {
  display: grid;
  gap: 5px;
  margin-top: 14px;
  padding: 12px;
  border: 1px solid rgba(245, 158, 11, 0.32);
  border-radius: var(--radius);
  background: rgba(245, 158, 11, 0.12);
}

.case-objective strong {
  color: #78350f;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.case-objective span {
  color: #344054;
  line-height: 1.4;
}

.urgency-box {
  margin-top: 12px;
  padding: 10px 12px;
  border-left: 4px solid var(--red);
  border-radius: 6px;
  background: rgba(239, 68, 68, 0.1);
  color: #374151;
  line-height: 1.4;
}

.stake-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.stake-grid div {
  padding: 10px;
  border: 1px solid rgba(23, 32, 51, 0.12);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.56);
}

.stake-grid strong,
.stake-grid span {
  display: block;
}

.stake-grid strong {
  color: #111827;
  font-size: 15px;
}

.stake-grid span {
  margin-top: 3px;
  color: #667085;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.alert-card {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.alert-card div {
  padding: 10px 12px;
  border: 1px solid rgba(23, 32, 51, 0.12);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.6);
}

.alert-card span,
.alert-card strong {
  display: block;
}

.alert-card span {
  color: #667085;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.alert-card strong {
  margin-top: 3px;
  color: #111827;
}

.transaction-table {
  display: grid;
  gap: 8px;
}

.event-list,
.ip-table,
.baseline-list {
  display: grid;
  gap: 8px;
}

.event-row,
.ip-row,
.baseline-list div {
  display: grid;
  gap: 4px;
  padding: 10px;
  border: 1px solid rgba(23, 32, 51, 0.12);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.62);
}

.event-row span,
.ip-row span,
.ip-row b,
.ip-row em,
.baseline-list div {
  color: #4b5563;
  font-size: 12px;
}

.event-row strong,
.ip-row strong {
  color: #111827;
  font-size: 13px;
}

.ip-row b {
  font-weight: 900;
}

.ip-row em {
  font-style: normal;
  line-height: 1.35;
}

.notepad-section {
  background: rgba(245, 158, 11, 0.08);
}

.my-notes {
  display: grid;
  gap: 8px;
  margin: 10px 0;
}

.my-notes div,
.my-notes p {
  margin: 0;
  padding: 9px 10px;
  border: 1px solid rgba(23, 32, 51, 0.12);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.62);
  color: #344054;
  font-size: 13px;
  line-height: 1.35;
}

.flag-button {
  justify-self: start;
  min-height: 32px;
  margin-top: 6px;
  padding: 0 10px;
  border: 1px solid rgba(23, 32, 51, 0.18);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.72);
  color: #344054;
  font-size: 12px;
  font-weight: 900;
}

.flag-button.selected {
  border-color: rgba(245, 158, 11, 0.55);
  background: rgba(245, 158, 11, 0.18);
  color: #78350f;
}

.optional-notepad {
  margin-top: 12px;
  color: #344054;
}

.optional-notepad summary {
  cursor: pointer;
  font-weight: 850;
}

.notepad {
  width: 100%;
  min-height: 118px;
  resize: vertical;
  padding: 12px;
  border: 1px solid rgba(23, 32, 51, 0.16);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.82);
  color: #172033;
  line-height: 1.45;
}

.narrative-feedback {
  margin: 12px 0 0;
  color: var(--muted);
  line-height: 1.45;
}

.txn-row {
  display: grid;
  grid-template-columns: 74px 1fr auto;
  gap: 8px;
  align-items: start;
  padding: 10px;
  border: 1px solid rgba(23, 32, 51, 0.12);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.62);
}

.txn-row span,
.txn-row b,
.txn-row em {
  color: #4b5563;
  font-size: 12px;
}

.txn-row strong {
  color: #111827;
  font-size: 13px;
}

.txn-row b {
  font-weight: 900;
  text-align: right;
}

.txn-row em {
  grid-column: 1 / -1;
  font-style: normal;
  line-height: 1.35;
}

.file-section {
  padding: 16px 18px;
  border-bottom: 1px solid rgba(23, 32, 51, 0.12);
}

.file-section h3 {
  margin: 0 0 10px;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.file-help {
  margin: -2px 0 12px;
  color: #667085;
  font-size: 13px;
  line-height: 1.4;
}

.clue-grid {
  display: grid;
  gap: 10px;
}

.clue-card {
  overflow: hidden;
  border: 1px solid rgba(23, 32, 51, 0.14);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.45);
}

.clue-card.open {
  background: rgba(255, 255, 255, 0.72);
}

.clue-toggle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  min-height: 58px;
  padding: 12px;
  border: 0;
  background: transparent;
  color: #172033;
  text-align: left;
}

.clue-toggle strong,
.clue-toggle small {
  display: block;
}

.clue-toggle small {
  margin-top: 2px;
  color: #667085;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.clue-body {
  padding: 0 12px 12px;
}

.detail-list {
  display: grid;
  gap: 8px;
  margin: 0;
}

.detail-row {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 10px;
  color: #364152;
  line-height: 1.35;
}

.detail-row strong {
  color: #111827;
}

.red-flags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.flag-chip {
  padding: 8px 10px;
  border-radius: 999px;
  background: rgba(239, 68, 68, 0.12);
  color: #7f1d1d;
  font-size: 13px;
  font-weight: 800;
}

.evidence-card {
  width: 100%;
  padding: 13px;
  margin: 8px 0;
  background: rgba(255, 255, 255, 0.58);
  color: #172033;
  text-align: left;
  border-color: rgba(23, 32, 51, 0.14);
}

.evidence-card p {
  display: none;
  margin-top: 8px;
  color: #4b5563;
}

.evidence-card.expanded p {
  display: block;
}

.choices {
  display: grid;
  gap: 10px;
}

.choice-button {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 12px 14px;
  border: 1px solid rgba(23, 32, 51, 0.16);
  background: #ffffff;
  color: #172033;
  text-align: left;
}

.choices.compact {
  gap: 8px;
}

.choices.compact .choice-button {
  min-height: 42px;
  padding: 10px 12px;
  font-size: 14px;
}

.choice-button.selected {
  border-color: rgba(239, 68, 68, 0.55);
  background: rgba(239, 68, 68, 0.1);
  color: #7f1d1d;
}

.choice-button.correct-pick {
  border-color: rgba(34, 197, 94, 0.65);
  background: rgba(34, 197, 94, 0.12);
  color: #14532d;
}

.choice-button.wrong-pick {
  border-color: rgba(239, 68, 68, 0.72);
  background: rgba(239, 68, 68, 0.12);
  color: #7f1d1d;
}

.info-dot {
  display: inline-grid;
  place-items: center;
  width: 18px;
  height: 18px;
  margin-left: 6px;
  border-radius: 50%;
  background: rgba(56, 189, 248, 0.16);
  color: #0369a1;
  font-size: 12px;
  font-weight: 900;
}

.disposition-choice > span:first-child {
  display: grid;
  gap: 3px;
}

.disposition-choice small {
  color: #667085;
  font-size: 12px;
  line-height: 1.25;
}

.disposition-choice.selected small {
  color: #7f1d1d;
}

.hint-box {
  display: none;
  margin-top: 12px;
  padding: 12px;
  border-radius: var(--radius);
  background: rgba(245, 158, 11, 0.13);
  color: #78350f;
  line-height: 1.45;
}

.hint-box.visible {
  display: block;
}

.result-card {
  padding: 18px;
  margin-bottom: 14px;
}

.takeaway-card {
  border-color: rgba(245, 158, 11, 0.35);
  background: rgba(245, 158, 11, 0.08);
}

.result-hero {
  padding: 22px;
  border-radius: var(--radius);
  background: var(--panel);
  box-shadow: var(--shadow);
}

.result-hero.correct {
  border: 1px solid rgba(34, 197, 94, 0.45);
}

.result-hero.incorrect {
  border: 1px solid rgba(239, 68, 68, 0.45);
}

.score-big {
  margin: 8px 0 0;
  font-size: 48px;
  font-weight: 950;
}

.score-breakdown {
  display: grid;
  gap: 8px;
}

.score-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px 12px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 255, 255, 0.045);
}

.score-row span {
  color: var(--ink);
  font-weight: 850;
}

.score-row strong {
  color: var(--amber);
}

.score-row em {
  grid-column: 1 / -1;
  color: var(--muted);
  font-size: 13px;
  font-style: normal;
  line-height: 1.35;
}

.progress-bar {
  overflow: hidden;
  height: 10px;
  margin: 8px 0 4px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.progress-bar > span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--red), var(--amber));
}

.badge-card {
  padding: 12px;
}

.badge-card.locked {
  opacity: 0.42;
}

.empty-state {
  padding: 22px;
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  color: var(--muted);
  text-align: center;
}

@media (min-width: 760px) {
  .app-shell {

  ["Account Takeover", "Someone gains control of an existing customer's account. Look for password resets, new devices, profile changes, SIM swaps, and new recipients."],
  ["First-Party Fraud", "The real customer controls the account and benefits from the abuse, such as dispute abuse, refund abuse, or intentional nonpayment."],

  ["Elder/Vulnerable Adult Exploitation", "A customer who is older or vulnerable is pressured, tricked, or controlled into moving money. These cases often need escalation beyond a normal fraud review."],
  ["Real Identity Theft", "A real person's identity is used without permission. Victim reports, stolen documents, and mismatched contact details matter."],
  ["Synthetic Identity Fraud", "A fake or blended identity is built to look real, often with thin files, new contact details, staged repayment, and later cash-out."],

];

function loadProgress() {
  const fallback = { cases: {}, badges: [] };
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || fallback;
    saved.cases = saved.cases || {};
    saved.badges = saved.badges || [];
    return saved;
  } catch {
    return fallback;
  }
}

function saveProgress() {
  state.progress.mode = state.mode;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
}

function clearActiveCaseState() {
  state.selectedClassification = null;
  state.selectedTypologies = new Set();
  state.selectedEvidence = new Set();
  state.flaggedEvidence = new Set();
  state.expandedEvidence = new Set();
  state.openClues = new Set(["summary"]);
  state.selectedSarDecision = null;
  state.activeTypologyInfo = null;
  state.caseNotes = "";
  state.narrativeDraft = "";
  state.hintCount = 0;
  state.narrativeFeedback = "";
  state.narrativeSelections = new Set();
  state.narrativeProMode = false;
  state.lastResult = null;
}

function restartCurrentCase() {
  if (!state.selectedCaseId) {
    navigate("cases");
    return;
  }
  if (!confirm("Restart this case? Your saved overall progress will stay.")) return;
  localStorage.removeItem(`redFlagNotes_${state.selectedCaseId}`);
  const id = state.selectedCaseId;
  clearActiveCaseState();
  state.caseNotes = "";
  startCase(id);
}

function resetGameProgress() {
  if (!confirm("Reset the whole game and clear all saved progress?")) return;
  localStorage.removeItem(STORAGE_KEY);
  CASES.forEach((item) => {
    localStorage.removeItem(`redFlagNotes_${item.id}`);
    localStorage.removeItem(`redFlagNarrative_${item.id}`);
  });
  state.screen = "home";
  state.selectedCaseId = null;
  clearActiveCaseState();
  state.history = ["home"];
  state.progress = loadProgress();
  state.mode = "Training";
  state.pendingScrollTop = true;
  render();
}

function completedCases() {
  return Object.values(state.progress.cases).filter(Boolean);
}

function caseById(id) {
  return CASES.find((item) => item.id === id);
}

function alertId(item) {
  const difficultyPrefix = { Beginner: "B", Intermediate: "I", Advanced: "A", Expert: "E" }[item.difficulty] || "X";
  return `RF-${difficultyPrefix}-${item.id.toUpperCase()}`;
}

function documentationPacket(item) {
  return ["IP/session data", "profile information", "transaction activity", "customer notes", "recipient/suspect information"];
}

function priorCaseHistory(item) {
  return PRIOR_CASE_HISTORY[item.id] || "No prior fraud cases on this customer.";
}

function fullDateTime(value, fallbackDate = "07/02/2026") {
  const text = String(value || "");
  if (/^\d{2}\/\d{2}\/\d{4}\s+\d{1,2}:\d{2}\s+[AP]M$/i.test(text)) return text;
  if (/^\d{2}\/\d{2}\/\d{4},\s*\d{1,2}:\d{2}\s+[AP]M$/i.test(text)) return text.replace(",", "");
  if (/^\d{2}\/\d{2}\s+\d{1,2}:\d{2}\s+[AP]M$/i.test(text)) return `${text.slice(0, 5)}/2026${text.slice(5)}`;
  if (/^\d{1,2}:\d{2}\s+[AP]M$/i.test(text)) return `${fallbackDate} ${text}`;
  return text;
}

function p2pRecipient(item, type = "") {
  const known = {
    b1: "Marcus D.",
    i3: "Darius M.",
    i5: "Riley T.",
    a2: "Lena P.",
    i4: "Elena M.",
    a5: "Devon R.",
    e3: "Oliver K.",
    e4: "Thomas B.",
    e5: "Daniel R.",
    a7: "M. Vargas"
  };
  if (known[item.id]) return known[item.id];
  const info = SUSPECT_INFO[item.id] || "";
  const match = info.match(/(?:recipient|contact|suspect|holder|owner):?\s*([A-Z][A-Za-z.]+\s+[A-Z]\.)/);
  return match ? match[1] : "recipient";
}

function transactionIpFor(item) {
  const sessions = IP_SESSION_LOGS[item.id] || [];
  const suspicious = sessions.find(([, ip, , , region, , , action]) =>
    ip && ip !== "-" && region && !/normal customer login|support call|authenticated call/i.test(action || "")
  );
  return suspicious || sessions.find(([, ip]) => ip && ip !== "-") || ["", "104.28.45.12", "US", "United States", "Georgia", "33.7490", "-84.3880", "session"];
}

function transactionActivity(item) {
  const base = TRANSACTION_ACTIVITY[item.id] || Object.entries(item.transaction).map(([key, value]) => [key, "Detail", "-", value]);
  return base.map(([time, type, amount, detail]) => {
    const fullTime = fullDateTime(time);
    let displayType = type;
    let displayDetail = detail;
    if (/^(Zelle|PayPal|P2P)$/i.test(type)) displayType = `${type} to ${p2pRecipient(item, type)}`;
    if (/^(Zelle|PayPal|P2P|ACH|Wire|Cash Advance|Internal Transfer)$/i.test(type) && !/checking|savings/i.test(displayDetail)) {
      displayDetail = `${displayDetail}; from checking`;
    }
    return [fullTime, displayType, amount, displayDetail];
  });
}

function profileEvents(item) {
  return (PROFILE_EVENTS[item.id] || []).map(([time, detail]) => [fullDateTime(time), detail]);
}

function ipSessionLogs(item) {
  const base = (IP_SESSION_LOGS[item.id] || []).map(([time, ip, cc, country, region, lat, lon, action]) =>
    [fullDateTime(time), ip, cc, country, region, lat, lon, action]
  );
  const hasNormal = base.filter(([, , , , , , , action]) => /normal customer login/i.test(action || "")).length >= 2;
  const anchor = base.find(([, ip]) => ip && ip !== "-") || ["", "104.28.45.12", "US", "United States", "Georgia", "33.7490", "-84.3880", ""];
  const normalRows = hasNormal ? [] : [
    ["06/24/2026 08:14 AM", anchor[1], anchor[2], anchor[3], anchor[4], anchor[5], anchor[6], "normal customer login"],
    ["06/29/2026 06:37 PM", anchor[1], anchor[2], anchor[3], anchor[4], anchor[5], anchor[6], "normal customer login"]
  ];
  const txIp = transactionIpFor(item);
  const transactionRows = transactionActivity(item)
    .filter(([time, type]) => /^\d{2}\/\d{2}\/\d{4}\s+\d{1,2}:\d{2}\s+[AP]M$/i.test(time) && !/Email|Returned Item|Aggregation/i.test(type))
    .filter(([time]) => !base.some(([sessionTime]) => sessionTime === time))
    .map(([time, type]) => [time, txIp[1], txIp[2], txIp[3], txIp[4], txIp[5], txIp[6], type]);
  const profileRows = profileEvents(item)
    .filter(([time]) => /^\d{2}\/\d{2}\/\d{4}\s+\d{1,2}:\d{2}\s+[AP]M$/i.test(time))
    .filter(([time]) => !base.some(([sessionTime]) => sessionTime === time) && !transactionRows.some(([sessionTime]) => sessionTime === time))
    .map(([time, detail]) => [time, txIp[1], txIp[2], txIp[3], txIp[4], txIp[5], txIp[6], detail]);
  return [...normalRows, ...base, ...profileRows, ...transactionRows];
}

function expectedTypologies(item) {
  return CORRECT_TYPOLOGIES[item.id] || [item.correct];
}

function customerBaseline(item) {
  return CUSTOMER_BASELINES[item.id] || ["Account tenure: unknown", "Occupation/income: not available", "Typical activity: not enough history", "Normal geography: not available"];
}

function typologySelectionLabel(choice) {

function fraudGuideDefinition(choice) {

function evidenceChain(item) {
  return EVIDENCE_CHAINS[item.id] || {
    pieces: [...item.redFlags.slice(0, 2), ...item.evidence.map((ev) => ev.title).slice(0, 2)],
    summary: "The right call comes from connecting the alert reason, transaction activity, customer profile, and supporting documentation instead of relying on one isolated fact."
  };

function evidenceOptions(item) {

function redFlagObservationOptions(item) {
  const neutral = [
    "Customer has an established account history",
    "Activity occurred from a known customer device",
    "Customer has ordinary grocery or pharmacy activity",
    "Prior alert was explained by customer context",
    "Documentation packet includes IP/session data",
    "Customer profile includes occupation and normal geography",

  ];
  return Array.from(new Set([
    ...Array.from(state.flaggedEvidence || []),
    ...item.redFlags,
    ...neutral.slice(0, 4)
  ])).slice(0, 10);
}

function evidenceSelectionLabel(choice) {

}

function flagButton(label) {
  const clean = escapeHtml(label);
  const active = state.flaggedEvidence.has(label);
  return `<button class="flag-button ${active ? "selected" : ""}" data-flag-evidence="${clean}" title="${active ? "Remove from My Notes" : "Flag for My Notes"}" aria-label="${active ? "Remove flagged evidence" : "Flag evidence"}">${active ? "Flagged" : "Flag"}</button>`;
}

function evidenceSupportBonus(item) {
  const expected = item.redFlags;
  const selected = Array.from(state.selectedEvidence);
  if (!selected.length) return 0;
  const matchesExpected = (choice) => expected.some((piece) => choice === piece || choice.includes(piece) || piece.includes(choice));
  const relevant = selected.filter(matchesExpected).length;
  const irrelevant = selected.filter((choice) => !matchesExpected(choice) && !state.flaggedEvidence.has(choice)).length;
  if (relevant >= Math.min(3, expected.length) && irrelevant === 0) return 20;
  if (relevant >= 2 && irrelevant <= 1) return 12;
  if (relevant >= 1) return 6;
  return 0;
}

function typologyBonus(item) {
  const expected = expectedTypologies(item);
  const selected = Array.from(state.selectedTypologies);
  const hasAllExpected = expected.every((choice) => state.selectedTypologies.has(choice));
  const hasOnlyExpected = selected.every((choice) => expected.includes(choice));
  if (state.selectedClassification === item.correct && hasAllExpected && hasOnlyExpected) return 10;
  if (state.selectedClassification === item.correct && hasAllExpected) return 6;
  return 0;
}

function requiresSarNarrative(item) {
  const expected = EXPECTED_SAR_DECISIONS[item.id] || "";
  return expected.includes("File SAR");
}

function narrativePrompt(item) {
  const [sourceType] = ALERT_SOURCES[item.id] || ["System-generated"];
  return `Build a short SAR narrative using who, what, when, where, and how. Start from your notes if they help. Source: ${sourceType}. Expected typology: ${expectedTypologies(item).join(" + ")}.`;
}

function narrativeFragments(item) {
  const txns = transactionActivity(item);
  const profiles = profileEvents(item);
  const suspect = SUSPECT_INFO[item.id] || "recipient information was reviewed.";
  const chain = evidenceChain(item);
  const firstTxn = txns[0] || ["the review date", "transaction", "unknown amount", "activity"];
  const sessions = ipSessionLogs(item);
  const sessionText = sessions.length
    ? `${sessions[0][1]} in ${sessions[0][4]} during ${sessions[0][7]}`
    : `the available case records for ${alertId(item)}`;
  const knownTimes = new Set([
    ...txns.map(([time]) => time),
    ...profiles.map(([time]) => time),
    ...sessions.map(([time]) => time)
  ].filter(Boolean));
  const transactionFactMatches = (fragment) => txns.some(([, type, amount]) =>
    amount && amount !== "-" && fragment.includes(amount) && fragment.includes(`by ${type}`)
  );
  const timeFactMatches = (fragment) => Array.from(knownTimes).some((time) =>
    time && fragment.includes(`on ${time}`)
  );
  const sessionFactMatches = (fragment) => sessions.some(([, ip, , , region, , , action]) =>
    ip && region && action && fragment.includes(`${ip} in ${region} during ${action}`)
  );
  const matchesCaseFact = (fragment) =>
    transactionFactMatches(fragment) || timeFactMatches(fragment) || sessionFactMatches(fragment);
  const inflatedAmount = (seedAmount, offset = 317) => {
    const number = String(seedAmount || "").match(/\$([\d,]+)/);
    const base = number ? Number(number[1].replace(/,/g, "")) : 300;
    let inflated = base + offset;
    const existingAmounts = new Set(txns.map(([, , amount]) => amount).filter(Boolean));
    while (existingAmounts.has(`$${inflated.toLocaleString("en-US")}`)) inflated += 317;
    return `$${inflated.toLocaleString("en-US")}`;
  };
  const alteredWhen = () => {
    const fallbacks = ["07/04/2026 03:17 AM", "06/30/2026 04:43 PM", "the day after the first reviewed event"];
    return fallbacks.find((time) => !knownTimes.has(time)) || "a later unrecorded review date";
  };
  const alteredSessionText = () => {
    const base = sessions[0];
    if (!base) return `203.0.113.250 in Wyoming during ${firstTxn[1].toLowerCase()} review`;
    const regions = ["Wyoming", "Oregon", "Maine", "Idaho", "New Mexico"];
    const region = regions.find((candidate) => !sessions.some(([, ip, , , rowRegion, , , action]) =>
      ip === base[1] && rowRegion === candidate && action === `${firstTxn[1].toLowerCase()} review`
    )) || "Wyoming";
    return `${base[1]} in ${region} during ${firstTxn[1].toLowerCase()} review`;
  };
  const ensureFalse = (candidate, fallback) => matchesCaseFact(candidate) ? fallback() : candidate;
  const wrongAmount = inflatedAmount(firstTxn[2]);
  const wrongWhen = alteredWhen();
  const wrongSessionText = alteredSessionText();
  const correct = [
    `Who: ${item.title} involves the customer and ${suspect}`,
    `What: The reviewed activity includes ${firstTxn[2]} by ${firstTxn[1]}.`,
    `When: Key activity began on ${firstTxn[0]}.`,
    `Where: IP/session records show ${sessionText}.`,
    `How: ${chain.summary}`
  ];
  const distractors = [
    `Who: ${item.title} involves the customer and ${suspect} with no additional threshold or disposition concern.`,
    ensureFalse(
      `What: The reviewed activity includes ${wrongAmount} by ${firstTxn[1]}.`,
      () => `What: The reviewed activity includes ${inflatedAmount(firstTxn[2], 634)} by ${firstTxn[1]}.`
    ),
    ensureFalse(
      `When: Key activity began on ${wrongWhen}.`,
      () => `When: Key activity began on a later unrecorded review date.`
    ),
    ensureFalse(
      `Where: IP/session records show ${wrongSessionText}.`,
      () => `Where: IP/session records show 203.0.113.250 in Wyoming during ${firstTxn[1].toLowerCase()} review.`
    ),
    `How: ${chain.pieces[0]} is present, but the file supports closing because the activity is fully customer-confirmed.`
  ];
  return { correct, all: Array.from(new Set([...correct, ...distractors])) };
}

function narrativeBuilderScore(item) {
  const { correct } = narrativeFragments(item);
  const selected = Array.from(state.narrativeSelections);
  const allCorrect = correct.every((part) => state.narrativeSelections.has(part));
  const noWrong = selected.every((part) => correct.includes(part) || state.flaggedEvidence.has(part));
  if (allCorrect && noWrong) return ["Narrative", 100, "Complete narrative: who, what, when, where, and how are all supported by the file."];
  const correctCount = selected.filter((part) => correct.includes(part)).length;
  return ["Narrative", Math.round((correctCount / correct.length) * 100), `Selected ${correctCount} of ${correct.length} required narrative pieces. Remove unsupported fragments and include all five elements.`];
}

function regENoteApplies(item) {
  const [sourceType, reason] = ALERT_SOURCES[item.id] || [];
  const electronic = transactionActivity(item).some(([, type]) => ["Zelle", "PayPal", "ACH", "Wire", "Cash Advance"].includes(type));
  return sourceType === "Client-reported" && electronic && /unauthorized|did not recognize|reported|denies|victim/i.test(`${reason} ${item.notes}`);
}

function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function difficultyUnlocked(difficulty) {
  if (difficulty === "Beginner") return true;
  const index = DIFFICULTIES.indexOf(difficulty);
  const previous = DIFFICULTIES[index - 1];
  return completedCases().filter((entry) => entry.difficulty === previous).length >= 3;
}

function gradeForScore(score) {
  if (score >= 90) return "S";
  if (score >= 80) return "A";
  if (score >= 65) return "B";
  if (score >= 50) return "C";
  return "Review";
}

function investigatorRank() {
  const done = completedCases();
  const accuracy = done.length ? done.filter((c) => c.wasCorrect).length / done.length : 0;
  if (done.length >= 16 && accuracy >= 0.85) return "Elder Exploitation Specialist";
  if (done.length >= 12 && accuracy >= 0.85) return "SAR Reviewer";
  if (done.length >= 8) return "Fraud Analyst";
  if (done.length >= 4) return "Alert Investigator";
  if (done.length >= 1) return "Rookie Investigator";
  return "Trainee";
}

function sarDecisionBonus(item) {
  return state.selectedSarDecision === EXPECTED_SAR_DECISIONS[item.id] ? 25 : 0;
}

function dispositionButton(decision) {
  const [label, detail] = DISPOSITION_COPY[decision] || [decision, ""];
  return `<button class="choice-button disposition-choice ${state.selectedSarDecision === decision ? "selected" : ""}" data-sar-decision="${decision}"><span><strong>${label}</strong><small>${detail}</small></span><span>${state.selectedSarDecision === decision ? "OK" : "+"}</span></button>`;
}

function caseObjective(item) {
  if (item.correct === "Normal Customer Behavior") return "Decide whether the alert is explainable and should close with no fraud found.";
  if (requiresSarNarrative(item)) return "Decide whether the evidence supports fraud and whether the case is SAR-reportable or requires escalation.";
  return "Decide whether fraud is confirmed, whether the amount meets a SAR threshold, and what evidence supports the call.";
}

function caseTakeaway(item) {
  const expected = EXPECTED_SAR_DECISIONS[item.id];
  if (item.id === "b1") return "Takeaway: attackers may move funds internally first, such as savings to checking, before sending money out. That staging step can confuse the customer because the first missing funds appear as an internal movement instead of an external payment.";
  if (expected === "Close - no fraud found") return "Takeaway: no fraud found means the alert was explained by the evidence.";
  if (expected === "Fraud confirmed - no SAR required (below threshold)") return "Takeaway: below-threshold fraud is still fraud. Document it and handle customer remediation separately from SAR filing.";
  if (expected === "File SAR") return "Takeaway: SAR decisions depend on suspicious activity, amount, suspect information, and aggregation.";
  if (expected === "File SAR + escalate to law enforcement/APS") return "Takeaway: elder or vulnerable adult exploitation can require both SAR filing and external escalation.";
  if (expected === "Continuing activity review") return "Takeaway: when suspicious activity continues after a SAR has already been filed, the case is handled as continuing activity review. The follow-up SAR is filed on the review cycle instead of treating it as a brand-new first-time SAR.";
  return "Takeaway: use the complete evidence picture before choosing the disposition.";
}

function evidenceSupportScore(item) {
  const score = evidenceSupportBonus(item);
  if (score === 20) return ["Red flags", 20, "Identified the key red flags without unsupported extras."];
  if (score === 12) return ["Red flags", 12, "Identified enough red flags, but missed part of the pattern or included one weaker item."];
  if (score === 6) return ["Red flags", 6, "Identified some red flags, but the support was incomplete."];
  return ["Red flags", 0, "No selected observations clearly supported the conclusion."];
}

function typologyScore(item) {
  const primary = state.selectedClassification === item.correct ? 25 : 0;
  const overlap = typologyBonus(item);
  const expected = expectedTypologies(item);
  if (primary && overlap === 10) return ["Typology", 35, `Correct primary typology and correct overlap: ${expected.join(" + ")}.`];
  if (primary && overlap === 6) return ["Typology", 31, `Correct primary typology, but the overlap selection was not perfect. Best-supported: ${expected.join(" + ")}.`];
  if (primary) return ["Typology", 25, `Correct primary typology. Best-supported: ${expected.join(" + ")}.`];
  return ["Typology", 0, `Primary typology should be ${item.correct}.`];
}

function scoreBreakdown(item, seconds) {
  const rows = [];
  rows.push(["Starting credit", 20, "Completed the review."]);
  rows.push(typologyScore(item));
  rows.push(evidenceSupportScore(item));
  rows.push(["Disposition", sarDecisionBonus(item), state.selectedSarDecision === EXPECTED_SAR_DECISIONS[item.id] ? "Correct disposition." : `Recommended disposition: ${EXPECTED_SAR_DECISIONS[item.id]}.`]);
  rows.push(["No-hint bonus", state.hintCount === 0 ? 10 : 0, state.hintCount === 0 ? "No hints used." : `${state.hintCount} hint${state.hintCount === 1 ? "" : "s"} used, so this bonus was not awarded.`]);
  rows.push(["Hint penalty", state.hintCount ? -10 * state.hintCount : 0, state.hintCount ? `-${10 * state.hintCount} points for hint use.` : "No hint penalty."]);
  if (state.mode === "Challenge") rows.push(["Speed bonus", seconds <= 60 ? 10 : 0, seconds <= 60 ? "Closed in 60 seconds or less." : "Closed after the speed bonus window."]);
  return rows;
}

function reviewWasCorrect(item) {
  return state.selectedClassification === item.correct
    && state.selectedSarDecision === EXPECTED_SAR_DECISIONS[item.id]
    && evidenceSupportBonus(item) >= 12;
}

function calculateScore(hintCount, seconds, item) {
  let score = 20;
  if (state.selectedClassification === item.correct) score += 25;
  score += evidenceSupportBonus(item);
  score += typologyBonus(item);
  score += sarDecisionBonus(item);
  if (hintCount === 0) score += 10;
  if (state.mode === "Challenge" && seconds <= 60) score += 10;
  score -= hintCount * 10;
  return Math.max(0, Math.min(100, score));
}

function caseConsequence(item, wasCorrect) {
  if (wasCorrect) {
    if (item.correct === "Normal Customer Behavior") return "You documented why the alert was explainable and avoided over-escalating a good customer.";
    if (item.correct === "Third-Party Fraud") return "You identified the scam pattern and preserved the evidence needed for SAR or scam review.";
    if (item.correct === "Account Takeover") return "You recognized the access compromise pattern and documented the account-control evidence.";
    return "You made the right typology call and preserved the evidence needed for review.";
  }
  if (item.correct === "Normal Customer Behavior") return "The alert may be over-escalated even though the behavior was explainable.";
  if (item.correct === "Third-Party Fraud") return "The scam pattern may be missed if the customer-control evidence is mistaken for normal behavior.";
  if (item.correct === "Account Takeover") return "The access compromise pattern may be missed if profile and login evidence are not weighted correctly.";
  return "The pattern may continue until the evidence is connected and routed correctly.";
}

function sarFeedback(item, selectedDecision) {
  const expected = EXPECTED_SAR_DECISIONS[item.id];
  const rationale = SAR_RATIONALES[item.id] || "Document the alert review and supporting evidence.";
  if (!selectedDecision) return `No disposition selected. Recommended disposition: ${expected}. ${rationale}`;
  if (selectedDecision === expected) return `Good disposition: ${selectedDecision}. ${rationale}`;
  return `You chose ${selectedDecision}. Recommended decision: ${expected}. ${rationale}`;
}

function typologyFeedback(item, selectedPrimary) {
  const expected = expectedTypologies(item);
  const selected = Array.from(state.selectedTypologies);
  const overlap = expected.filter((choice) => selected.includes(choice));
  if (!selected.length) return `Expected typology: ${expected.join(" + ")}.`;
  if (selectedPrimary === item.correct && overlap.length === expected.length) return `Good typology work. Primary: ${item.correct}. Also supported: ${expected.filter((choice) => choice !== item.correct).join(", ") || "none"}.`;
  return `You selected ${selected.join(", ")}. Best-supported typology: ${expected.join(" + ")}.`;
}

function narrativeFeedback(text) {
  const lower = (text || "").toLowerCase();
  const checks = [
    ["who", /(customer|victim|recipient|suspect|account)/],
    ["what", /(wire|zelle|paypal|transfer|purchase|withdrawal|funds)/],
    ["when", /(today|yesterday|day|am|pm|\/|2026|monday|tuesday|wednesday|thursday|friday|saturday|sunday)/],
    ["where", /(georgia|florida|south carolina|nevada|alabama|ip|location|region|state)/],
    ["how", /(call|text|link|profile|login|recipient|pressure|imposter|romance|device|password)/]
  ];
  const met = checks.filter(([, pattern]) => pattern.test(lower)).map(([label]) => label);
  const missing = checks.filter(([, pattern]) => !pattern.test(lower)).map(([label]) => label);
  if ((text || "").trim().length < 80) return "Add more detail. A good SAR narrative should tell the story with evidence, not just name the fraud type.";
  if (!missing.length) return "Strong narrative draft. It covers who, what, when, where, and how, and it ties the conclusion back to evidence.";
  return `Good start. You covered ${met.join(", ") || "some evidence"}, but still need ${missing.join(", ")}.`;
}

function awardBadges() {
  const completed = completedCases();
  const cases = state.progress.cases;
  const earned = new Set(state.progress.badges || []);
  if (completed.length >= 1) earned.add("First Case Closed");
  if (completed.length >= 5) earned.add("Case File Rookie");
  if (completed.filter((c) => c.correctAnswer === "Account Takeover" && c.wasCorrect).length >= 3) earned.add("ATO Spotter");
  if (completed.filter((c) => c.correctAnswer === "Normal Customer Behavior" && c.wasCorrect).length >= 3) earned.add("No Fraud Found");
  if (completed.filter((c) => c.score >= 90).length >= 5) earned.add("Pattern Pro");
  const beginnerIntermediateDone = CASES
    .filter((c) => c.difficulty === "Beginner" || c.difficulty === "Intermediate")
    .every((c) => cases[c.id]);
  if (beginnerIntermediateDone) earned.add("Fraud Analyst");
  state.progress.badges = Array.from(earned);
}

function navigate(screen, data = {}) {
  state.screen = screen;
  Object.assign(state, data);
  state.history.push(screen);
  state.pendingScrollTop = true;
  render();
}

function goBack() {
  if (state.screen === "home") return;
  if (state.screen === "play") navigate("cases");
  else navigate("home");
}

function setActiveNav() {
  document.querySelectorAll("[data-nav]").forEach((button) => {
    button.classList.toggle("active", button.dataset.nav === state.screen);
  });
}

function render() {
  setActiveNav();
  const app = document.getElementById("app");
  if (state.screen === "home") app.innerHTML = homeScreen();
  if (state.screen === "how") app.innerHTML = howScreen();
  if (state.screen === "cases") app.innerHTML = casesScreen();
  if (state.screen === "play") app.innerHTML = playScreen();
  if (state.screen === "answer") app.innerHTML = answerScreen();
  if (state.screen === "progress") app.innerHTML = progressScreen();
  bindScreenEvents();
  if (state.pendingScrollTop) {
    state.pendingScrollTop = false;
    requestAnimationFrame(() => window.scrollTo({ top: 0, left: 0, behavior: "auto" }));
  }
}

        <h3>What this is</h3>
        <p>A SAR narrative is the short story of the suspicious activity. It should explain who was involved, what happened, when it happened, where it happened, and how the scheme worked.</p>
        <p class="file-help">${SAR_NARRATIVE_EXAMPLE}</p>
      </article>
      <article class="result-card">
        <h3>Your narrative draft</h3>
        <p class="file-help">${narrativePrompt(item)}</p>
        ${item.difficulty === "Expert" ? `
          <div class="mode-toggle narrative-mode" aria-label="Narrative mode">
            <button class="${!state.narrativeProMode ? "selected" : ""}" data-action="narrative-builder-mode">Tap Builder</button>
            <button class="${state.narrativeProMode ? "selected" : ""}" data-action="narrative-pro-mode">Pro Text</button>
          </div>
        ` : ""}
        ${state.narrativeProMode && item.difficulty === "Expert" ? `
          <textarea class="notepad" data-narrative placeholder="Optional Pro mode: write a SAR narrative here.">${escapeHtml(state.narrativeDraft)}</textarea>
        ` : `
          <div class="choices compact">
            ${fragments.all.map((fragment) => `<button class="choice-button ${state.narrativeSelections.has(fragment) ? "selected" : ""}" data-narrative-fragment="${escapeHtml(fragment)}"><span>${fragment}</span><span>${state.narrativeSelections.has(fragment) ? "Selected" : "+"}</span></button>`).join("")}
          </div>
          <div class="my-notes"><strong>Flagged evidence reference:</strong>${Array.from(state.flaggedEvidence).length ? Array.from(state.flaggedEvidence).map((flag) => `<div>${escapeHtml(flag)}</div>`).join("") : "<p>No flagged evidence yet.</p>"}</div>
        `}
        <button class="secondary-button" data-action="check-narrative">Check Narrative</button>
        <p class="narrative-feedback">${narrativeCheck || "Select the narrative pieces that cover who, what, when, where, and how."}</p>
      </article>
    ` : ""}
    <div class="button-row">
      <button class="primary-button" data-action="next-case">Next Case</button>
      <button class="secondary-button" data-nav-target="cases">Case List</button>
    </div>
  `;
}

function progressScreen() {
  const done = completedCases();
  const totalScore = done.reduce((sum, item) => sum + item.score, 0);
  const accuracy = done.length ? Math.round((done.filter((c) => c.wasCorrect).length / done.length) * 100) : 0;
  const bestScore = done.length ? Math.max(...done.map((item) => item.score)) : 0;
  const avgGrade = done.length ? gradeForScore(Math.round(totalScore / done.length)) : "N/A";
  const categories = CHOICES.map((choice) => {
    const matching = done.filter((item) => item.correctAnswer === choice);
    const right = matching.filter((item) => item.wasCorrect).length;
    return [choice, matching.length ? Math.round((right / matching.length) * 100) : 0, matching.length];
  });
  const allBadges = ["First Case Closed", "Case File Rookie", "ATO Spotter", "No Fraud Found", "Pattern Pro", "Fraud Analyst"];
  return `
    <h2 class="page-title">Progress</h2>
    <section class="stats-grid">
      <div class="stat-card"><span class="stat-value">${done.length}/${CASES.length}</span><span class="stat-label">Cases</span></div>
      <div class="stat-card"><span class="stat-value">${accuracy}%</span><span class="stat-label">Accuracy</span></div>
      <div class="stat-card"><span class="stat-value">${bestScore}</span><span class="stat-label">Best Score</span></div>
      <div class="stat-card"><span class="stat-value">${avgGrade}</span><span class="stat-label">Avg Grade</span></div>
    </section>
    <article class="info-card"><h3>Current Rank</h3><p>${investigatorRank()}</p></article>
    <h3 class="section-title">Category Performance</h3>
    ${categories.map(([name, pct, count]) => `
      <article class="info-card">
        <h3>${name}</h3>
        <div class="progress-bar"><span style="width:${pct}%"></span></div>
        <p>${count ? `${pct}% accuracy across ${count} completed case${count === 1 ? "" : "s"}.` : "No completed cases in this category yet."}</p>
      </article>
    `).join("")}
    <h3 class="section-title">Badges</h3>
    <section class="badge-grid">
      ${allBadges.map((badge) => `<div class="badge-card ${state.progress.badges.includes(badge) ? "" : "locked"}"><strong>${badge}</strong><p class="small-label">${state.progress.badges.includes(badge) ? "Earned" : "Locked"}</p></div>`).join("")}
    </section>
    <button class="secondary-button" data-action="reset">Reset Progress</button>
  `;
}

function startCase(id) {
  state.selectedCaseId = id;
  state.hintCount = 0;
  state.startedAt = Date.now();
  state.expandedEvidence = new Set();
  state.openClues = new Set(["notes"]);
  state.selectedEvidence = new Set();
  state.flaggedEvidence = new Set();
  state.selectedClassification = null;
  state.selectedTypologies = new Set();
  state.selectedSarDecision = null;
  state.activeTypologyInfo = null;
  state.caseNotes = loadCaseNotes(id);
  state.narrativeDraft = loadNarrativeDraft(id);
  state.narrativeFeedback = "";
  state.narrativeSelections = new Set();
  state.narrativeProMode = false;
  navigate("play", { selectedCaseId: id });
}

function chooseAnswer(choice) {
  const item = caseById(state.selectedCaseId);
  const seconds = Math.round((Date.now() - state.startedAt) / 1000);
  const wasCorrect = reviewWasCorrect(item);
  const score = calculateScore(state.hintCount, seconds, item);
  const old = state.progress.cases[item.id];
  if (!old || score > old.score) {
    state.progress.cases[item.id] = {
      score,
      grade: gradeForScore(score),
      selected: choice,
      correctAnswer: item.correct,
      wasCorrect,
      difficulty: item.difficulty,
      seconds,
      hintsUsed: state.hintCount,
      mode: state.mode,
      selectedEvidence: Array.from(state.selectedEvidence),
      selectedSarDecision: state.selectedSarDecision,
      selectedTypologies: Array.from(state.selectedTypologies),
      cluesOpened: state.openClues.size
    };
  }
  state.lastResult = { score, selected: choice, wasCorrect, seconds, selectedEvidence: Array.from(state.selectedEvidence), selectedSarDecision: state.selectedSarDecision, selectedTypologies: Array.from(state.selectedTypologies) };
  state.lastResult.breakdown = scoreBreakdown(item, seconds);
  awardBadges();
  saveProgress();
  navigate("answer");
}

function nextCase() {
  const orderedCases = [...CASES].sort((a, b) => DIFFICULTIES.indexOf(a.difficulty) - DIFFICULTIES.indexOf(b.difficulty));
  const currentIndex = orderedCases.findIndex((item) => item.id === state.selectedCaseId);
  const next = orderedCases.slice(currentIndex + 1).find((item) => difficultyUnlocked(item.difficulty));
  if (next) startCase(next.id);
  else navigate("cases");
}

function bindScreenEvents() {
  document.querySelectorAll("[data-nav-target]").forEach((button) => {
    button.addEventListener("click", () => navigate(button.dataset.navTarget));
  });
  document.querySelectorAll("[data-case-id]").forEach((button) => {
    button.addEventListener("click", () => startCase(button.dataset.caseId));
  });
  document.querySelectorAll("[data-classification]").forEach((button) => {
    button.addEventListener("click", (event) => {
      const info = event.target.closest("[data-typology-info]");
      if (info) {
        event.stopPropagation();
        state.activeTypologyInfo = info.dataset.typologyInfo;
        render();
        return;
      }
      const choice = button.dataset.classification;
      if (state.selectedTypologies.has(choice)) {
        state.selectedTypologies.delete(choice);
        if (state.selectedClassification === choice) {
          state.selectedClassification = Array.from(state.selectedTypologies)[0] || null;
        }
      } else {
        state.selectedTypologies.add(choice);
        if (!state.selectedClassification) state.selectedClassification = choice;
      }
      render();
    });
  });
  document.querySelectorAll("[data-evidence]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.evidence);
      if (state.expandedEvidence.has(index)) state.expandedEvidence.delete(index);
      else state.expandedEvidence.add(index);
      render();
    });
  });
  document.querySelectorAll("[data-clue]").forEach((button) => {
    button.addEventListener("click", () => {
      const clue = button.dataset.clue;
      if (state.openClues.has(clue)) state.openClues.delete(clue);
      else state.openClues.add(clue);
      render();
    });
  });
  document.querySelectorAll("[data-support-evidence]").forEach((button) => {
    button.addEventListener("click", () => {
      const evidence = button.dataset.supportEvidence;
      if (state.selectedEvidence.has(evidence)) state.selectedEvidence.delete(evidence);
      else state.selectedEvidence.add(evidence);
      render();
    });
  });
  document.querySelectorAll("[data-flag-evidence]").forEach((button) => {
    button.addEventListener("click", (event) => {
      event.stopPropagation();
      const evidence = button.dataset.flagEvidence;
      if (state.flaggedEvidence.has(evidence)) {
        state.flaggedEvidence.delete(evidence);
        state.selectedEvidence.delete(evidence);
      } else {
        state.flaggedEvidence.add(evidence);
        state.selectedEvidence.add(evidence);
      }
      render();
    });
  });
  document.querySelectorAll("[data-sar-decision]").forEach((button) => {
    button.addEventListener("click", () => {
      state.selectedSarDecision = button.dataset.sarDecision;
      render();
    });
  });
  document.querySelectorAll("[data-notepad]").forEach((input) => {
    input.addEventListener("input", () => {
      state.caseNotes = input.value;
      saveCaseNotes();
    });
  });
  document.querySelectorAll("[data-narrative]").forEach((input) => {
    input.addEventListener("input", () => {
      state.narrativeDraft = input.value;
      saveNarrativeDraft();
    });
  });
  document.querySelectorAll("[data-narrative-fragment]").forEach((button) => {
    button.addEventListener("click", () => {
      const fragment = button.dataset.narrativeFragment;
      if (state.narrativeSelections.has(fragment)) state.narrativeSelections.delete(fragment);
      else state.narrativeSelections.add(fragment);
      render();
    });
  });
  document.querySelectorAll("[data-mode]").forEach((button) => {
    button.addEventListener("click", () => {
      state.mode = button.dataset.mode;
      saveProgress();
      render();
    });
  });
  document.querySelectorAll("[data-action]").forEach((button) => {
    button.addEventListener("click", () => {
      const action = button.dataset.action;
      if (action === "start") navigate("cases");
      if (action === "hint") {
        const item = caseById(state.selectedCaseId);
        if (state.hintCount < item.hints.length) state.hintCount += 1;
        render();
      }
      if (action === "submit-decision") {
        if (!state.selectedEvidence.size) {
          alert("Choose at least one red flag before submitting.");
          return;
        }
        if (!state.selectedClassification) {
          alert("Choose at least one typology before submitting.");
          return;
        }
        if (!state.selectedSarDecision) {
          alert("Choose a case disposition before submitting.");
          return;
        }
        chooseAnswer(state.selectedClassification);
      }
      if (action === "check-narrative") {
        const narrative = document.querySelector("[data-narrative]");
        const item = caseById(state.selectedCaseId);
        if (state.narrativeProMode && narrative) {
          state.narrativeFeedback = narrativeFeedback(narrative.value);
        } else {
          const [, pct, note] = narrativeBuilderScore(item);
          state.narrativeFeedback = `Narrative score: ${pct}. ${note}`;
        }
        render();
      }
      if (action === "narrative-pro-mode") {
        state.narrativeProMode = true;
        render();
      }
      if (action === "narrative-builder-mode") {
        state.narrativeProMode = false;
        render();
      }
      if (action === "next-case") nextCase();
      if (action === "reset") {
        resetGameProgress();
      }
    });
  });
}

document.querySelectorAll("[data-nav]").forEach((button) => {
  button.addEventListener("click", () => navigate(button.dataset.nav));
});
document.getElementById("backButton").addEventListener("click", goBack);
document.getElementById("progressButton").addEventListener("click", () => navigate("progress"));
document.getElementById("resetMenuButton").addEventListener("click", (event) => {
  event.stopPropagation();
  const menu = document.getElementById("resetMenu");
  const isOpen = menu.classList.toggle("open");
  document.getElementById("resetMenuButton").setAttribute("aria-expanded", String(isOpen));
});
document.querySelectorAll("[data-reset-option]").forEach((button) => {
  button.addEventListener("click", () => {
    document.getElementById("resetMenu").classList.remove("open");
    document.getElementById("resetMenuButton").setAttribute("aria-expanded", "false");
    if (button.dataset.resetOption === "case") restartCurrentCase();
    if (button.dataset.resetOption === "game") resetGameProgress();
  });
});
document.addEventListener("click", (event) => {
  const menu = document.getElementById("resetMenu");
  if (!menu.contains(event.target)) {
    menu.classList.remove("open");
    document.getElementById("resetMenuButton").setAttribute("aria-expanded", "false");
  }
});

render();

</script>
</body>
</html>
